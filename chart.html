<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>그래프</title>
  </head>
  <style>
    /* font style */
    @import url("https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap");
    .raleway-base {
      font-family: "Raleway", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
    }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #chart {
      width: 500px;
      background-color: #000;
      color: #fff;
      padding: 2rem;
      border-radius: 1rem;
    }
    h1 {
      text-align: center;
      font-size: 2.5rem;
    }
    .container {
      margin: 1rem 0;
    }
    .container > .txt {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.7rem;
    }
    .container > .line {
      border: 1px solid #fff;
      border-radius: 3px;
      padding: 5px;
    }
    .container > .line > .fill {
      width: 90%;
      height: 15px;
      background-image: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045);
      animation-name: progress;
      animation-duration: 2s;
      animation-fill-mode: both;
    }
    #chart > .container:nth-of-type(1) .fill {
      animation-delay: 0s;
    }
    #chart > .container:nth-of-type(2) .fill {
      animation-delay: 0.2s;
    }
    #chart > .container:nth-of-type(3) .fill {
      animation-delay: 0.4s;
    }
    #chart > .container:nth-of-type(4) .fill {
      animation-delay: 0.6s;
    }
    #chart > .container:nth-of-type(5) .fill {
      animation-delay: 0.8s;
    }
    @keyframes progress {
      0% {
        width: 0;
      }
    }
  </style>
  <body class="raleway-base">
    <div id="chart">
      <h1>SOFTWARE SKILLS</h1>
      <div class="container">
        <div class="txt">
          <p>HTML5</p>
          <p>90%</p>
        </div>
        <div class="line">
          <div class="fill" style="width: 90%"></div>
        </div>
      </div>
      <div class="container">
        <div class="txt">
          <p>CSS3</p>
          <p>80%</p>
        </div>
        <div class="line">
          <div class="fill" style="width: 80%"></div>
        </div>
      </div>
      <div class="container">
        <div class="txt">
          <p>jQuery</p>
          <p>65%</p>
        </div>
        <div class="line">
          <div class="fill" style="width: 65%"></div>
        </div>
      </div>
      <div class="container">
        <div class="txt">
          <p>Photoshop</p>
          <p>70%</p>
        </div>
        <div class="line">
          <div class="fill" style="width: 70%"></div>
        </div>
      </div>
      <div class="container">
        <div class="txt">
          <p>Illustrator</p>
          <p>85%</p>
        </div>
        <div class="line">
          <div class="fill" style="width: 85%"></div>
        </div>
      </div>
    </div>
  </body>
</html>
